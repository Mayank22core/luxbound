<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="screen-orientation" content="landscape" />
    <title>LuxBound: Vampire Escape</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; position: fixed; top: 0; left: 0; }
      body { touch-action: none; overscroll-behavior: none; -webkit-overflow-scrolling: none; }
      #root { width: 100%; height: 100%; }
      @media (orientation: portrait) {
        body::after {
          content: 'Rotate your device to landscape';
          position: fixed;
          top: 0; left: 0; right: 0; bottom: 0;
          background: #000;
          color: #fff;
          display: flex;
          align-items: center;
          justify-content: center;
          font-family: 'Courier New', monospace;
          font-size: 16px;
          text-align: center;
          z-index: 99999;
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
